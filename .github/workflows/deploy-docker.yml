name: Deploy Docker (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$(dirname "$APP_DIR")"
              sudo chown -R $USER:$USER "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            cat > .env.production <<EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BCRYPT_ROUNDS=12
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            EOF

            chmod +x ./scripts/deploy/deploy-main.sh

            APP_DIR="$APP_DIR" BRANCH=main COMPOSE_FILE=docker-compose.prod.yml ./scripts/deploy/deploy-main.sh
