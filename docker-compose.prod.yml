services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    volumes:
      - backend_data:/app/data
    expose:
      - "5000"
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  storefront:
    build:
      context: .
      dockerfile: docker/Dockerfile.storefront
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3002"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      storefront:
        condition: service_started
      admin:
        condition: service_started
      backend:
        condition: service_healthy
      webhook:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "3002:3002"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  webhook:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-your-webhook-secret-key-05230523}
      APP_DIR: /app
      NODE_ENV: production
      PORT: 5555
    command: node webhook-server.js
    expose:
      - "5555"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5555/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_data:
